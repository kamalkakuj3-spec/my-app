<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>বাংলাদেশ - বিভাগ ও জেলা (শুধু বাংলা)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e0f2e9 0%, #c8e0d4 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .card-header {
            background: linear-gradient(95deg, #0a5c3b, #188c4a);
            color: white;
            padding: 22px 28px;
        }
        .card-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .card-header p {
            opacity: 0.9;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        .card-body {
            padding: 28px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            font-weight: 700;
            color: #1a5a3a;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #d1e0d4;
            border-radius: 28px;
            background: white;
            font-weight: 500;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #188c4a;
        }
        select:disabled {
            background: #f4f9f6;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .counter {
            font-size: 0.75rem;
            color: #4a6b5c;
            margin-top: 8px;
            margin-left: 10px;
        }
        .selected-info {
            background: #eef6f1;
            border-radius: 20px;
            padding: 14px 20px;
            margin-top: 20px;
            border-left: 5px solid #188c4a;
        }
        .badge {
            background: #188c4a;
            color: white;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 10px;
        }
        .selected-text {
            font-weight: 600;
            color: #0f402c;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #1a5a3a;
        }
        .error-msg {
            background: #ffe6e5;
            border-left: 5px solid #c7362b;
            padding: 12px;
            border-radius: 16px;
            color: #a1221a;
            margin-top: 15px;
        }
        .success-msg {
            background: #e0f7ea;
            border-left: 5px solid #188c4a;
            padding: 12px;
            border-radius: 16px;
            color: #0f5236;
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🇧🇩 বাংলাদেশ বিভাগ ও জেলা</h1>
            <p>বিভাগ নির্বাচন করলে সংশ্লিষ্ট জেলা দেখাবে</p>
        </div>
        <div class="card-body">
            <div id="loadStatus" class="success-msg" style="margin-bottom: 20px;">⏳ JSON ফাইল লোড হচ্ছে...</div>

            <div class="form-group">
                <label>📌 ১. বিভাগ নির্বাচন করুন</label>
                <select id="divisionSelect" disabled>
                    <option value="">লোড হচ্ছে...</option>
                </select>
                <div class="counter" id="divisionCount"></div>
            </div>

            <div class="form-group">
                <label>📍 ২. জেলা নির্বাচন করুন</label>
                <select id="districtSelect" disabled>
                    <option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>
                </select>
                <div class="counter" id="districtCount"></div>
            </div>

            <div class="selected-info">
                <span class="badge">✔ বর্তমান নির্বাচন</span>
                <div class="selected-text" id="selectionDisplay">কোনো তথ্য নির্বাচিত হয়নি</div>
            </div>
        </div>
    </div>
</div>

<script>
    let divisionsData = [];
    let districtsData = [];

    const divisionSelect = document.getElementById('divisionSelect');
    const districtSelect = document.getElementById('districtSelect');
    const selectionDisplay = document.getElementById('selectionDisplay');
    const loadStatusDiv = document.getElementById('loadStatus');

    // JSON ফাইল লোড করার ফাংশন
    async function loadJSON(url, fileName) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`${fileName} পাওয়া যায়নি (HTTP ${response.status})`);
            }
            const data = await response.json();
            return data;
        } catch (err) {
            throw new Error(`${fileName}: ${err.message}`);
        }
    }

    // সব ডাটা লোড করুন
    async function loadAllData() {
        try {
            loadStatusDiv.innerHTML = '⏳ divisions.json লোড হচ্ছে...';
            divisionsData = await loadJSON('divisions.json', 'divisions.json');
            
            loadStatusDiv.innerHTML = '⏳ districts.json লোড হচ্ছে...';
            districtsData = await loadJSON('districts.json', 'districts.json');

            loadStatusDiv.innerHTML = `✅ সফল! ${divisionsData.length}টি বিভাগ, ${districtsData.length}টি জেলা লোড হয়েছে।`;
            loadStatusDiv.style.background = '#e0f7ea';
            loadStatusDiv.style.borderLeftColor = '#188c4a';
            
            console.log('Divisions:', divisionsData);
            console.log('Districts:', districtsData);

            populateDivisions();
            divisionSelect.disabled = false;
            
        } catch (error) {
            console.error(error);
            loadStatusDiv.innerHTML = `❌ লোড ব্যর্থ: ${error.message}<br><br>
            <strong>সমাধান:</strong> নিশ্চিত করুন যে নিচের ফাইলগুলো একই ফোল্ডারে আছে:<br>
            📄 divisions.json &nbsp; 📄 districts.json`;
            loadStatusDiv.style.background = '#ffe6e5';
            loadStatusDiv.style.borderLeftColor = '#c7362b';
        }
    }

    // বিভাগ ড্রপডাউন পপুলেট করা
    function populateDivisions() {
        divisionSelect.innerHTML = '<option value="">-- একটি বিভাগ নির্বাচন করুন --</option>';
        divisionsData.forEach(div => {
            const option = document.createElement('option');
            option.value = div.id;
            option.textContent = div.name;
            divisionSelect.appendChild(option);
        });
        document.getElementById('divisionCount').innerText = `মোট ${divisionsData.length}টি বিভাগ`;
    }

    // বিভাগ অনুযায়ী জেলা ফিল্টার করা
    function getDistrictsByDivision(divisionId) {
        return districtsData.filter(d => d.division_id == divisionId);
    }

    // বিভাগ পরিবর্তন হলে জেলা আপডেট করা
    function updateDistricts(divisionId) {
        if (!divisionId) {
            districtSelect.innerHTML = '<option value="">-- প্রথমে বিভাগ নির্বাচন করুন --</option>';
            districtSelect.disabled = true;
            document.getElementById('districtCount').innerText = '';
            return;
        }
        
        const filtered = getDistrictsByDivision(divisionId);
        districtSelect.innerHTML = '<option value="">-- একটি জেলা নির্বাচন করুন --</option>';
        
        filtered.forEach(dist => {
            const option = document.createElement('option');
            option.value = dist.id;
            option.textContent = dist.name;
            districtSelect.appendChild(option);
        });
        
        districtSelect.disabled = false;
        document.getElementById('districtCount').innerText = `মোট ${filtered.length}টি জেলা`;
        
        // জেলা নির্বাচন রিসেট
        districtSelect.value = "";
        updateSelectionDisplay();
    }

    // নির্বাচিত তথ্য দেখানো
    function updateSelectionDisplay() {
        const divisionId = divisionSelect.value;
        const districtId = districtSelect.value;
        
        const division = divisionsData.find(d => d.id == divisionId);
        const district = districtsData.find(d => d.id == districtId);
        
        let text = '';
        if (division) text = `বিভাগ: ${division.name}`;
        if (district) text += ` → জেলা: ${district.name}`;
        
        selectionDisplay.innerText = text || 'কোনো তথ্য নির্বাচিত হয়নি';
    }

    // ইভেন্ট লিসেনার
    divisionSelect.addEventListener('change', (e) => {
        const divId = e.target.value;
        updateDistricts(divId);
        updateSelectionDisplay();
    });
    
    districtSelect.addEventListener('change', () => {
        updateSelectionDisplay();
    });

    // শুরু করা
    loadAllData();
</script>
</body>
</html>
