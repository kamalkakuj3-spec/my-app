<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>লগইন - পাইকারি বাজার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --primary-glow: rgba(108,43,217,0.4);
    --accent: #f0c040;
    --bg: #f5f3ff;
    --text: #1a1a2e;
    --text-light: #666;
    --shadow-sm: 0 4px 15px rgba(108,43,217,0.08);
    --shadow-md: 0 8px 30px rgba(108,43,217,0.12);
    --shadow-lg: 0 20px 50px rgba(108,43,217,0.15);
    --shadow-xl: 0 30px 60px rgba(108,43,217,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Hind Siliguri', sans-serif;
    background: radial-gradient(circle at 10% 20%, #f5f3ff 0%, #ede8ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Animations */
@keyframes float3d {
    0%, 100% { transform: translateY(0) rotateX(0); }
    50% { transform: translateY(-10px) rotateX(5deg); }
}

@keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes scaleIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 0 0 var(--primary-glow); }
    70% { box-shadow: 0 0 0 15px rgba(108,43,217,0); }
    100% { box-shadow: 0 0 0 0 rgba(108,43,217,0); }
}

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

.login-container-3d {
    max-width: 420px;
    width: 100%;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(10px);
    border-radius: 48px;
    padding: 40px 28px;
    box-shadow: var(--shadow-xl);
    text-align: center;
    animation: scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    border: 1px solid rgba(108,43,217,0.1);
}

.logo-3d {
    width: 80px;
    height: 80px;
    background: linear-gradient(145deg, var(--primary), var(--primary-light));
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    margin: 0 auto 20px;
    box-shadow: var(--shadow-lg);
    animation: float3d 3s ease-in-out infinite;
}

h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
}

.subtitle {
    color: var(--text-light);
    font-size: 13px;
    margin-bottom: 32px;
}

/* Input Fields */
.input-group {
    margin-bottom: 20px;
    text-align: left;
}
.input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
}
.input-wrap {
    position: relative;
}
.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--primary);
}
.input-field-3d {
    width: 100%;
    padding: 14px 14px 14px 44px;
    font-size: 14px;
    font-family: inherit;
    border: 2px solid #e8e0ff;
    border-radius: 24px;
    outline: none;
    transition: all 0.2s;
    background: #faf8ff;
}
.input-field-3d:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-glow);
    background: white;
}
.pass-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #aaa;
    transition: color 0.2s;
}
.pass-toggle:hover { color: var(--primary); }
.forgot-link {
    text-align: right;
    margin-top: 8px;
}
.forgot-link a {
    font-size: 11px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}
.forgot-link a:hover { text-decoration: underline; }

/* Login Button */
.login-btn-3d {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    background-size: 200% 200%;
    animation: shimmer 3s ease infinite;
    color: white;
    border: none;
    border-radius: 60px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.login-btn-3d:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}
.login-btn-3d:active {
    transform: scale(0.98);
}
.login-btn-3d.loading {
    background: #b39ddb;
    pointer-events: none;
}

/* Register Link */
.register-link {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
}
.register-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
}
.register-link a:hover { text-decoration: underline; }
.back-home {
    display: inline-block;
    margin-top: 20px;
    color: var(--text-light);
    font-size: 12px;
    text-decoration: none;
}
.back-home:hover { color: var(--primary); }

/* Messages */
.error-message, .success-message {
    padding: 12px;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
}
.error-message { background: #fee2e2; color: #dc2626; }
.success-message { background: #dcfce7; color: #16a34a; }

.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
}
.login-btn-3d.loading .spinner { display: block; }
.login-btn-3d.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-container-3d">
    <div class="logo-3d">🏪</div>
    <h1>স্বাগতম!</h1>
    <div class="subtitle">আপনার অ্যাকাউন্টে লগইন করুন</div>

    <div id="errorMessage" class="error-message"><i class="fas fa-exclamation-circle"></i> <span id="errorText"></span></div>
    <div id="successMessage" class="success-message"><i class="fas fa-check-circle"></i> <span id="successText"></span></div>

    <div class="input-group">
        <label><i class="fas fa-envelope"></i> ইমেইল ঠিকানা</label>
        <div class="input-wrap">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input class="input-field-3d" type="email" id="emailInput" placeholder="you@example.com">
        </div>
    </div>

    <div class="input-group">
        <label><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
        <div class="input-wrap">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input class="input-field-3d" type="password" id="passwordInput" placeholder="••••••••">
            <span class="pass-toggle" onclick="togglePassword()"><i class="fas fa-eye"></i></span>
        </div>
        <div class="forgot-link"><a href="#" onclick="forgotPassword()">পাসওয়ার্ড ভুলে গেছেন?</a></div>
    </div>

    <button class="login-btn-3d" id="loginBtn" onclick="login()">
        <div class="spinner"></div>
        <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i> লগইন করুন</span>
    </button>

    <div class="register-link">
        নতুন ব্যবহারকারী? <a href="register.html">অ্যাকাউন্ট তৈরি করুন</a>
    </div>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> হোমপেজে ফিরুন</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain: "agls-5bd4c.firebaseapp.com",
    databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId: "agls-5bd4c",
});
const auth = firebase.auth();

function togglePassword() {
    const pass = document.getElementById('passwordInput');
    const icon = document.querySelector('.pass-toggle i');
    if(pass.type === 'password') { pass.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
    else { pass.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
}

async function forgotPassword() {
    const email = document.getElementById('emailInput').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    if(!email) {
        document.getElementById('errorText').textContent = 'পাসওয়ার্ড রিসেট করতে আগে আপনার ইমেইল দিন!';
        errorDiv.style.display = 'flex';
        return;
    }
    try {
        await auth.sendPasswordResetEmail(email);
        document.getElementById('successText').textContent = 'পাসওয়ার্ড রিসেট ইমেইল পাঠানো হয়েছে! আপনার ইনবক্স চেক করুন।';
        successDiv.style.display = 'flex';
    } catch(error) {
        if(error.code === 'auth/user-not-found') document.getElementById('errorText').textContent = 'এই ইমেইলে কোনো অ্যাকাউন্ট নেই!';
        else document.getElementById('errorText').textContent = 'সমস্যা হয়েছে! আবার চেষ্টা করুন।';
        errorDiv.style.display = 'flex';
    }
}

async function login() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');
    const loginBtn = document.getElementById('loginBtn');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    if(!email || !password) {
        document.getElementById('errorText').textContent = 'ইমেইল এবং পাসওয়ার্ড উভয়ই প্রয়োজন';
        errorDiv.style.display = 'flex';
        return;
    }
    loginBtn.classList.add('loading');
    try {
        await auth.signInWithEmailAndPassword(email, password);
        document.getElementById('successText').textContent = 'লগইন সফল! রিডাইরেক্ট হচ্ছে...';
        successDiv.style.display = 'flex';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } catch(error) {
        loginBtn.classList.remove('loading');
        let msg = '';
        if(error.code === 'auth/user-not-found') msg = 'এই ইমেইলে কোনো অ্যাকাউন্ট নেই।';
        else if(error.code === 'auth/wrong-password') msg = 'পাসওয়ার্ড ভুল।';
        else if(error.code === 'auth/invalid-email') msg = 'সঠিক ইমেইল দিন।';
        else if(error.code === 'auth/too-many-requests') msg = 'অনেকবার চেষ্টা করেছেন! কিছুক্ষণ পর চেষ্টা করুন।';
        else msg = 'লগইন ব্যর্থ হয়েছে। আবার চেষ্টা করুন।';
        document.getElementById('errorText').textContent = msg;
        errorDiv.style.display = 'flex';
    }
}

auth.onAuthStateChanged((user) => { if(user && window.location.pathname.includes('login.html')) window.location.href = 'dashboard.html'; });
document.getElementById('passwordInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
