<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন | BizNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #e8e0ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(108,43,217,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin: 0 auto 20px;
        }
        h1 { font-size: 1.8rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
        .sub { color: #64748b; margin-bottom: 32px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #475569; margin-bottom: 6px; display: block; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #6c2bd9; box-shadow: 0 0 0 3px rgba(108,43,217,0.1); }
        .password-wrapper { position: relative; }
        .pass-toggle {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8;
        }
        .forgot { text-align: right; margin: -12px 0 20px; }
        .forgot a { font-size: 0.75rem; color: #6c2bd9; text-decoration: none; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }
        .login-btn:hover { transform: scale(0.98); }
        .register-link { text-align: center; font-size: 0.85rem; color: #64748b; }
        .register-link a { color: #6c2bd9; font-weight: 600; text-decoration: none; }
        .back-home { display: inline-block; margin-top: 20px; font-size: 0.8rem; color: #94a3b8; text-decoration: none; }
        .error-msg, .success-msg { padding: 12px; border-radius: 20px; margin-bottom: 16px; font-size: 0.8rem; display: none; }
        .error-msg { background: #fee2e2; color: #dc2626; }
        .success-msg { background: #dcfce7; color: #16a34a; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">🏪</div>
    <h1>স্বাগতম</h1>
    <div class="sub">আপনার অ্যাকাউন্টে লগইন করুন</div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="input-group"><label>ইমেইল ঠিকানা</label><input type="email" id="email" placeholder="you@example.com"></div>
    <div class="input-group"><label>পাসওয়ার্ড</label><div class="password-wrapper"><input type="password" id="password" placeholder="••••••••"><span class="pass-toggle" onclick="togglePass()">👁️</span></div></div>
    <div class="forgot"><a href="#" onclick="forgotPass()">পাসওয়ার্ড ভুলে গেছেন?</a></div>
    <button class="login-btn" id="loginBtn" onclick="login()">🔐 লগইন করুন</button>
    <div class="register-link">নতুন ব্যবহারকারী? <a href="register.html">অ্যাকাউন্ট তৈরি করুন</a></div>
    <a href="index.html" class="back-home">← হোমপেজে ফিরুন</a>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",authDomain:"agls-5bd4c.firebaseapp.com",databaseURL:"https://agls-5bd4c-default-rtdb.firebaseio.com/",projectId:"agls-5bd4c"});
const auth=firebase.auth();
function togglePass(){ const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'; }
async function forgotPass(){ const email=document.getElementById('email').value; if(!email){ showError('ইমেইল দিন'); return; } try{ await auth.sendPasswordResetEmail(email); showSuccess('রিসেট লিংক ইমেইলে পাঠানো হয়েছে'); }catch(e){ showError(e.message); } }
async function login(){ const email=document.getElementById('email').value; const pass=document.getElementById('password').value; if(!email||!pass){ showError('ইমেইল ও পাসওয়ার্ড দিন'); return; } const btn=document.getElementById('loginBtn'); btn.innerHTML='লগইন হচ্ছে...'; try{ await auth.signInWithEmailAndPassword(email,pass); window.location.href='dashboard.html'; }catch(e){ showError(e.message); btn.innerHTML='🔐 লগইন করুন'; } }
function showError(msg){ const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',4000); }
function showSuccess(msg){ const s=document.getElementById('successMsg'); s.textContent=msg; s.style.display='block'; setTimeout(()=>s.style.display='none',4000); }
</script>
</body>
</html>
