<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>লগইন — পাইকারি বাজার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --accent: #f0c040;
    --bg: #f5f3ff;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-light: #666;
    --error: #e74c3c;
    --success: #2ecc71;
    --card-shadow: 0 8px 32px rgba(108,43,217,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Hind Siliguri', sans-serif;
    background: linear-gradient(135deg, #f5f3ff 0%, #e8e0ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Login Container */
.login-container {
    max-width: 400px;
    width: 100%;
    background: white;
    border-radius: 28px;
    padding: 40px 32px;
    box-shadow: var(--card-shadow);
    border: 1.5px solid rgba(108,43,217,0.08);
    animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Header */
.header-icon {
    text-align: center;
    font-size: 48px;
    margin-bottom: 16px;
}

h1 {
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 32px;
}

/* Input Groups */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
}

.input-group label i {
    margin-right: 6px;
    color: var(--primary);
}

.input-wrap {
    position: relative;
}

.input-wrap input {
    width: 100%;
    padding: 14px 16px;
    padding-right: 75px;
    border: 2px solid #e8e0ff;
    border-radius: 14px;
    font-size: 14px;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--text);
    background: #faf8ff;
    outline: none;
    transition: all 0.2s;
}

.input-wrap input:focus {
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(108,43,217,0.08);
}

.input-wrap input::placeholder {
    color: #bbb;
}

/* Password Toggle - টেক্সট 버전 */
.pass-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--primary);
    background: #f0ebff;
    padding: 5px 10px;
    border-radius: 30px;
    transition: all 0.2s;
    font-family: 'Hind Siliguri', sans-serif;
    white-space: nowrap;
}

.pass-toggle:hover {
    background: var(--primary);
    color: white;
}

/* Forgot Password */
.forgot-password {
    text-align: right;
    margin-top: 8px;
}

.forgot-password a {
    font-size: 12px;
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
}

.forgot-password a:hover {
    color: var(--primary-dark);
    text-decoration: underline;
}

/* Login Button */
.login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 16px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(108,43,217,0.3);
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(108,43,217,0.4);
}

.login-btn:active {
    transform: translateY(0);
}

.login-btn.loading {
    opacity: 0.8;
    cursor: wait;
    transform: none;
}

.spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
}

.login-btn.loading .spinner {
    display: inline-block;
}

.login-btn.loading .btn-text {
    display: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Register Link */
.register-link {
    text-align: center;
    font-size: 14px;
    color: var(--text-light);
    padding-top: 16px;
    border-top: 1px solid #e8e0ff;
}

.register-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 700;
    transition: color 0.2s;
}

.register-link a:hover {
    color: var(--primary-dark);
    text-decoration: underline;
}

.register-link i {
    font-size: 12px;
    margin-left: 4px;
}

/* Back Home Link */
.back-home {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    color: var(--text-light);
    font-size: 13px;
    text-decoration: none;
    transition: color 0.2s;
    width: 100%;
}

.back-home:hover {
    color: var(--primary);
}

/* Toast Messages */
.toast-error {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #e74c3c;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1001;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(231,76,60,0.3);
    pointer-events: none;
}
.toast-error.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.toast-success {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2ecc71;
    color: white;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 1001;
    opacity: 0;
    transition: all 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(46,204,113,0.3);
    pointer-events: none;
}
.toast-success.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

/* Responsive */
@media (max-width: 480px) {
    .login-container {
        padding: 32px 24px;
        border-radius: 24px;
    }
    .toast-error, .toast-success {
        white-space: normal;
        text-align: center;
        max-width: 85%;
        bottom: 100px;
    }
    .pass-toggle {
        padding: 4px 8px;
        font-size: 11px;
    }
    .input-wrap input {
        padding-right: 65px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <div class="header-icon">🔐</div>
    <h1>লগইন করুন</h1>
    <div class="subtitle">আপনার অ্যাকাউন্টে প্রবেশ করুন</div>

    <div class="input-group">
        <label><i class="fas fa-envelope"></i> ইমেইল ঠিকানা</label>
        <div class="input-wrap">
            <input type="email" id="emailInput" placeholder="you@example.com">
        </div>
    </div>

    <div class="input-group">
        <label><i class="fas fa-lock"></i> পাসওয়ার্ড</label>
        <div class="input-wrap">
            <input type="password" id="passwordInput" placeholder="••••••••">
            <span class="pass-toggle" onclick="togglePassword()">দেখুন</span>
        </div>
        <div class="forgot-password">
            <a href="#" onclick="forgotPassword()">পাসওয়ার্ড ভুলে গেছেন?</a>
        </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
        <div class="spinner"></div>
        <span class="btn-text"><i class="fas fa-key"></i> লগইন করুন</span>
    </button>

    <div class="register-link">
        নতুন ব্যবহারকারী? <a href="register.html">অ্যাকাউন্ট তৈরি করুন <i class="fas fa-arrow-right"></i></a>
    </div>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> হোমপেজে ফিরুন</a>
</div>

<!-- Toast Messages -->
<div id="toastError" class="toast-error">⚠️ ইমেইল এবং পাসওয়ার্ড দিন!</div>
<div id="toastSuccess" class="toast-success">✅ লগইন সফল! রিডাইরেক্ট হচ্ছে...</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
// Firebase configuration
const firebaseConfig = {
    apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain: "agls-5bd4c.firebaseapp.com",
    databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId: "agls-5bd4c",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Toast functions
function showErrorToast(msg) {
    const toast = document.getElementById('toastError');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

function showSuccessToast(msg) {
    const toast = document.getElementById('toastSuccess');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}

// Toggle password visibility - টেক্সট পরিবর্তন সহ
window.togglePassword = function() {
    const passInput = document.getElementById('passwordInput');
    const toggleBtn = document.querySelector('.pass-toggle');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        toggleBtn.textContent = 'লুকান';
    } else {
        passInput.type = 'password';
        toggleBtn.textContent = 'দেখুন';
    }
};

// Forgot password function
window.forgotPassword = async function() {
    const email = document.getElementById('emailInput').value.trim();
    
    if (!email) {
        showErrorToast('⚠️ পাসওয়ার্ড রিসেট করতে ইমেইল দিন!');
        return;
    }
    
    try {
        await auth.sendPasswordResetEmail(email);
        showSuccessToast('✅ পাসওয়ার্ড রিসেট ইমেইল পাঠানো হয়েছে!');
    } catch (error) {
        if (error.code === 'auth/user-not-found') {
            showErrorToast('⚠️ এই ইমেইলে কোনো অ্যাকাউন্ট নেই!');
        } else if (error.code === 'auth/invalid-email') {
            showErrorToast('⚠️ সঠিক ইমেইল দিন!');
        } else {
            showErrorToast('⚠️ সমস্যা হয়েছে! আবার চেষ্টা করুন।');
        }
    }
};

// Login function
window.login = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const loginBtn = document.getElementById('loginBtn');
    
    if (!email || !password) {
        showErrorToast('⚠️ ইমেইল এবং পাসওয়ার্ড দিন!');
        return;
    }
    
    loginBtn.classList.add('loading');
    
    try {
        await auth.signInWithEmailAndPassword(email, password);
        showSuccessToast('✅ লগইন সফল! রিডাইরেক্ট হচ্ছে...');
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);
    } catch (error) {
        loginBtn.classList.remove('loading');
        
        if (error.code === 'auth/user-not-found') {
            showErrorToast('⚠️ এই ইমেইলে কোনো অ্যাকাউন্ট নেই!');
        } else if (error.code === 'auth/wrong-password') {
            showErrorToast('⚠️ পাসওয়ার্ড ভুল!');
        } else if (error.code === 'auth/invalid-email') {
            showErrorToast('⚠️ সঠিক ইমেইল দিন!');
        } else if (error.code === 'auth/too-many-requests') {
            showErrorToast('⚠️ অনেকবার চেষ্টা করেছেন! কিছুক্ষণ পর চেষ্টা করুন।');
        } else {
            showErrorToast('⚠️ লগইন ব্যর্থ হয়েছে!');
        }
    }
};

// যদি ইতিমধ্যে লগইন করা থাকে তাহলে index.html এ পাঠিয়ে দিন
auth.onAuthStateChanged((user) => {
    if (user && window.location.pathname.includes('login.html')) {
        window.location.href = 'index.html';
    }
});

// এন্টার কী প্রেস করলেও লগইন হবে
document.getElementById('passwordInput')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        login();
    }
});
</script>
</body>
</html>
