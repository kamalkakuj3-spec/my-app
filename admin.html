<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin Panel — পাইকারি বাজার</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --accent: #f0c040;
    --bg: #f5f3ff;
    --text: #1a1a2e;
    --text-light: #666;
    --success: #2ecc71;
    --success-dark: #27ae60;
    --error: #e74c3c;
    --error-dark: #c0392b;
    --warning: #f0c040;
    --warning-dark: #d4a000;
    --white: #ffffff;
    --card-shadow: 0 20px 35px -10px rgba(108,43,217,0.25);
    --card-shadow-hover: 0 25px 45px -12px rgba(108,43,217,0.35);
    --button-shadow: 0 8px 20px -5px rgba(108,43,217,0.3);
    --button-shadow-hover: 0 12px 28px -8px rgba(108,43,217,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:'Hind Siliguri',sans-serif; 
    background: linear-gradient(135deg, var(--bg) 0%, #ede8ff 100%);
    min-height:100vh; 
    overflow-x:hidden;
    padding-bottom: 30px;
}

/* HEADER - 3D Premium */
.header {
    background: linear-gradient(135deg, #1a0a3e 0%, #6c2bd9 50%, #a259f7 100%);
    padding: 55px 20px 28px;
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
}
.header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    border-radius: 50%;
    transform: translateZ(-20px);
    animation: float 8s ease-in-out infinite;
}
.header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(240,192,64,0.12) 0%, transparent 70%);
    border-radius: 50%;
    transform: translateZ(-15px);
    animation: float 6s ease-in-out infinite reverse;
}
@keyframes float {
    0%, 100% { transform: translate(0, 0) translateZ(-20px); }
    50% { transform: translate(15px, -15px) translateZ(-20px); }
}
.h-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 2;
}
.h-logo {
    display: flex;
    align-items: center;
    gap: 12px;
}
.h-logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    animation: logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow {
    0%, 100% { box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    50% { box-shadow: 0 8px 30px rgba(240,192,64,0.5); }
}
.h-logo-text {
    font-size: 18px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    letter-spacing: 1px;
}
.home-link {
    padding: 10px 22px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 99px;
    color: white;
    font-size: 13px;
    font-family: 'Hind Siliguri', sans-serif;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.home-link:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
.home-link:active {
    transform: translateY(1px);
}
.h-sub {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    margin-top: 12px;
    position: relative;
    z-index: 2;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* STATS - 3D Cards */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 20px 16px;
}
.stat-tile {
    background: white;
    border-radius: 24px;
    padding: 22px 18px;
    box-shadow: var(--card-shadow);
    text-align: center;
    border: none;
    transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform: translateY(0);
    position: relative;
    overflow: hidden;
    cursor: pointer;
}
.stat-tile::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
}
.stat-tile:hover::before {
    left: 100%;
}
.stat-tile:hover {
    transform: translateY(-8px);
    box-shadow: var(--card-shadow-hover);
}
.stat-tile:active {
    transform: translateY(-2px);
}
.stat-tile:nth-child(1){animation:tileIn 0.5s ease both 0.1s}
.stat-tile:nth-child(2){animation:tileIn 0.5s ease both 0.2s}
.stat-tile:nth-child(3){animation:tileIn 0.5s ease both 0.3s}
.stat-tile:nth-child(4){animation:tileIn 0.5s ease both 0.4s}
@keyframes tileIn {
    from{transform:translateY(35px) scale(0.92);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
}
.stat-num {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: numberPop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
}
@keyframes numberPop {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
}
.stat-label {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
}
.stat-tile.pending .stat-num { background: linear-gradient(135deg, var(--warning), #f5b042); -webkit-background-clip: text; background-clip: text; }
.stat-tile.approved .stat-num { background: linear-gradient(135deg, var(--success), #3ae374); -webkit-background-clip: text; background-clip: text; }
.stat-tile.rejected .stat-num { background: linear-gradient(135deg, var(--error), #ff6b6b); -webkit-background-clip: text; background-clip: text; }
.stat-tile.total .stat-num { background: linear-gradient(135deg, var(--primary), var(--primary-light)); -webkit-background-clip: text; background-clip: text; }

/* TABS - 3D Premium (নোটিশ ট্যাব বাদ) */
.tabs {
    display: flex;
    margin: 0 16px 20px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(108,43,217,0.15);
    overflow-x: auto;
    scrollbar-width: none;
    gap: 2px;
    padding: 4px;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
    flex: 1;
    min-width: 80px;
    padding: 14px 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-light);
    font-family: 'Hind Siliguri', sans-serif;
    transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    border-radius: 16px;
    position: relative;
    background: transparent;
}
.tab:hover {
    background: rgba(108,43,217,0.08);
    transform: translateY(-2px);
}
.tab.active {
    color: var(--primary);
    background: white;
    box-shadow: 0 6px 20px rgba(108,43,217,0.2);
    transform: translateY(-2px);
}
.tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--warning), #f5b042);
    color: white;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
    box-shadow: 0 2px 8px rgba(240,192,64,0.3);
}

/* SECTION */
.section { padding: 0 16px; }

/* ADMIN CARD - 3D Premium */
.admin-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
    border: none;
    transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform: translateY(0);
    position: relative;
    overflow: hidden;
}
.admin-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(108,43,217,0.05), transparent);
    transition: left 0.6s ease;
}
.admin-card:hover::before {
    left: 100%;
}
.admin-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-shadow-hover);
}
.ac-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
}
.ac-avatar {
    width: 55px;
    height: 55px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}
.admin-card:hover .ac-avatar {
    transform: scale(1.05) rotate(2deg);
}
.ac-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
}
.ac-info {
    font-size: 12px;
    color: var(--text-light);
}
.ac-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    color: var(--text-light);
    border-bottom: 1px solid #f0ebff;
    transition: all 0.2s ease;
}
.ac-row:hover {
    background: #faf8ff;
    padding-left: 6px;
    border-radius: 10px;
}
.ac-row:last-of-type { border-bottom: none; }
.ac-row-icon { font-size: 16px; width: 24px; }
.ac-row-val { color: var(--text); font-weight: 600; }
.status-badge {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 700;
    margin-left: auto;
    flex-shrink: 0;
    transition: all 0.2s ease;
}
.status-badge.pending  { background: linear-gradient(135deg, #fffbeb, #fff6e0); color: #d97706; border: 1px solid #fcd34d; }
.status-badge.approved { background: linear-gradient(135deg, #ecfdf5, #e0f5e8); color: #059669; border: 1px solid #6ee7b7; }
.status-badge.rejected { background: linear-gradient(135deg, #fef2f2, #fde8e6); color: #dc2626; border: 1px solid #fca5a5; }
.ac-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
}
.ac-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    border: none;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    transform: translateY(0);
    position: relative;
    overflow: hidden;
}
.ac-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}
.ac-btn:hover::before {
    width: 200px;
    height: 200px;
}
.ac-btn:hover {
    transform: translateY(-3px);
}
.ac-btn:active {
    transform: translateY(1px);
}
.btn-approve { background: linear-gradient(135deg, #ecfdf5, #e0f5e8); color: #059669; border: 1.5px solid #6ee7b7; box-shadow: 0 4px 12px rgba(46,204,113,0.2); }
.btn-approve:hover { box-shadow: 0 8px 20px rgba(46,204,113,0.35); }
.btn-reject  { background: linear-gradient(135deg, #fef2f2, #fde8e6); color: #dc2626; border: 1.5px solid #fca5a5; box-shadow: 0 4px 12px rgba(231,76,60,0.2); }
.btn-reject:hover { box-shadow: 0 8px 20px rgba(231,76,60,0.35); }
.btn-delete  { background: linear-gradient(135deg, #fef2f2, #fde8e6); color: #dc2626; border: 1.5px solid #fca5a5; box-shadow: 0 4px 12px rgba(231,76,60,0.2); }
.btn-delete:hover { box-shadow: 0 8px 20px rgba(231,76,60,0.35); }
.btn-view    { background: linear-gradient(135deg, #f0ebff, #e8e0ff); color: var(--primary); border: 1.5px solid #c4b5fd; box-shadow: 0 4px 12px rgba(108,43,217,0.2); }
.btn-view:hover { box-shadow: 0 8px 20px rgba(108,43,217,0.35); }

/* MARQUEE CARD - 3D Premium */
.marquee-card {
    background: white;
    border-radius: 28px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    margin: 0 16px 20px;
    transition: all 0.3s ease;
}
.marquee-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--card-shadow-hover);
}
.marquee-preview {
    background: linear-gradient(135deg, #f8f6ff, #f0ebff);
    padding: 16px;
    border-radius: 20px;
    margin-bottom: 24px;
    border: 1px solid #e8e0ff;
}
.marquee-label {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 8px;
    font-weight: 600;
}
.marquee-preview-area {
    background: linear-gradient(90deg, var(--primary), var(--primary-light));
    color: white;
    padding: 14px;
    border-radius: 99px;
    overflow-x: auto;
    white-space: nowrap;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(108,43,217,0.2);
}
.marquee-input {
    width: 100%;
    padding: 15px 18px;
    border: 2px solid #e8e0ff;
    border-radius: 18px;
    font-size: 14px;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--text);
    background: #faf8ff;
    outline: none;
    margin-bottom: 16px;
    transition: all 0.3s ease;
}
.marquee-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(108,43,217,0.1);
    transform: translateY(-2px);
}
.marquee-check {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
}
.marquee-check label {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
}
.marquee-save-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 800;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: var(--button-shadow);
}
.marquee-save-btn:hover {
    transform: translateY(-3px);
    box-shadow: var(--button-shadow-hover);
}
.marquee-save-btn:active {
    transform: translateY(1px);
}

/* SLIDER CARD */
.slider-card {
    background: white;
    border-radius: 28px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    margin: 0 16px 20px;
    transition: all 0.3s ease;
}
.slider-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--card-shadow-hover);
}
.sl-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f0ebff;
}
.sl-item {
    background: #faf8ff;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1.5px solid #e8e0ff;
    transition: all 0.3s ease;
}
.sl-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.sl-item img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
}
.sl-item-info {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
}
.sl-item-link {
    font-size: 12px;
    color: var(--text-light);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 240px;
}
.sl-del-btn {
    background: linear-gradient(135deg, #fef2f2, #fde8e6);
    color: #dc2626;
    border: 1.5px solid #fca5a5;
    border-radius: 14px;
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.3s ease;
}
.sl-del-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(231,76,60,0.3);
}
.sl-empty {
    text-align: center;
    color: var(--text-light);
    padding: 30px;
    font-size: 14px;
}
.sl-add-box {
    background: linear-gradient(135deg, #f0ebff, #e8e0ff);
    border-radius: 20px;
    padding: 20px;
    margin-top: 18px;
    border: 1.5px solid rgba(108,43,217,0.15);
}
.sl-add-title {
    font-size: 15px;
    font-weight: 800;
    color: var(--primary-dark);
    margin-bottom: 14px;
}
.sl-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid #e8e0ff;
    border-radius: 16px;
    font-size: 14px;
    font-family: 'Hind Siliguri', sans-serif;
    color: var(--text);
    background: white;
    outline: none;
    margin-bottom: 10px;
    transition: all 0.3s ease;
}
.sl-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(108,43,217,0.1);
    transform: translateY(-2px);
}
.sl-add-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 800;
    font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s ease;
    box-shadow: var(--button-shadow);
}
.sl-add-btn:hover {
    transform: translateY(-3px);
    box-shadow: var(--button-shadow-hover);
}
.sl-add-btn:active {
    transform: translateY(1px);
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
}
.empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
.empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
}

/* TOAST - Premium */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: linear-gradient(135deg, #1a1a2e, #2d2d44);
    color: white;
    padding: 14px 28px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 600;
    z-index: 9999;
    display: none;
    white-space: nowrap;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    font-family: 'Hind Siliguri', sans-serif;
    backdrop-filter: blur(10px);
    animation: toastIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
}
@keyframes toastIn {
    from { transform: translateX(-50%) translateY(30px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="h-top">
        <div class="h-logo">
            <div class="h-logo-icon">🛡️</div>
            <div class="h-logo-text">Admin Panel</div>
        </div>
        <a href="index.html" class="home-link">🏠 হোম</a>
    </div>
    <div class="h-sub">পাইকারি বাজার — সব নিয়ন্ত্রণ এখানে</div>
</div>

<!-- STATS -->
<div class="stats-grid">
    <div class="stat-tile total">
        <div class="stat-num" id="statTotal">০</div>
        <div class="stat-label">মোট দোকান</div>
    </div>
    <div class="stat-tile pending">
        <div class="stat-num" id="statPending">০</div>
        <div class="stat-label">⏳ পেন্ডিং</div>
    </div>
    <div class="stat-tile approved">
        <div class="stat-num" id="statApproved">০</div>
        <div class="stat-label">✅ Approved</div>
    </div>
    <div class="stat-tile rejected">
        <div class="stat-num" id="statRejected">০</div>
        <div class="stat-label">❌ Rejected</div>
    </div>
</div>

<!-- TABS (নোটিশ ট্যাব বাদ) -->
<div class="tabs">
    <div class="tab active" id="tabPending" onclick="switchTab('pending')">⏳ পেন্ডিং <span class="tab-badge" id="pendingBadge">0</span></div>
    <div class="tab" id="tabApproved" onclick="switchTab('approved')">✅ Approved</div>
    <div class="tab" id="tabRejected" onclick="switchTab('rejected')">❌ Rejected</div>
    <div class="tab" id="tabMarquee" onclick="switchTab('marquee')">📢 চলন্ত লেখা</div>
    <div class="tab" id="tabSlider" onclick="switchTab('slider')">🖼️ Slider</div>
</div>

<!-- SHOP SECTION -->
<div class="section" id="shopSection">
    <div id="shopList"></div>
</div>

<!-- MARQUEE SECTION -->
<div id="marqueeSection" style="display:none">
    <div class="marquee-card">
        <div class="nc-title">📢 চলন্ত লেখা (Marquee) নিয়ন্ত্রণ</div>
        <div class="marquee-preview">
            <div class="marquee-label">প্রিভিউ:</div>
            <div class="marquee-preview-area" id="marqueePreview">এখানে লেখা দেখাবে</div>
        </div>
        <input type="text" class="marquee-input" id="marqueeTextInput" placeholder="চলন্ত লেখার টেক্সট লিখুন...">
        <div class="marquee-check">
            <input type="checkbox" id="marqueeEnableCheck">
            <label>চলন্ত লেখা সক্রিয় করুন (On/Off)</label>
        </div>
        <button class="marquee-save-btn" onclick="saveMarquee()">💾 সেটিংস সংরক্ষণ করুন</button>
    </div>
</div>

<!-- SLIDER SECTION -->
<div id="sliderSection" style="display:none">
    <div class="slider-card">
        <div class="sl-title">🖼️ Image Slider পরিচালনা</div>
        <div id="slideList"><div class="sl-empty">লোড হচ্ছে...</div></div>
        <div class="sl-add-box">
            <div class="sl-add-title">➕ নতুন Slide যোগ করুন</div>
            <input class="sl-input" type="url" id="slideImg" placeholder="ছবির URL — https://example.com/image.jpg">
            <input class="sl-input" type="url" id="slideLink" placeholder="লিংক (ঐচ্ছিক) — https://...">
            <button class="sl-add-btn" onclick="addSlide()">➕ Slide যোগ করুন</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
    apiKey:"AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain:"agls-5bd4c.firebaseapp.com",
    databaseURL:"https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId:"agls-5bd4c",
});
const db = firebase.database();

let currentTab = 'pending';
let allShops   = {};

const grads = [
    'linear-gradient(135deg,#6c2bd9,#a259f7)',
    'linear-gradient(135deg,#0f3460,#16213e)',
    'linear-gradient(135deg,#1a6b3c,#2ecc71)',
    'linear-gradient(135deg,#e74c3c,#c0392b)',
    'linear-gradient(135deg,#f39c12,#e67e22)',
    'linear-gradient(135deg,#1abc9c,#16a085)'
];

// ══ LOAD ALL SHOPS ══
db.ref('shops').on('value', snap => {
    allShops = {};
    let total=0, pending=0, approved=0, rejected=0;
    if (snap.exists()) {
        snap.forEach(c => {
            allShops[c.key] = c.val();
            total++;
            const st = c.val().status;
            if (st==='pending') pending++;
            if (st==='approved') approved++;
            if (st==='rejected') rejected++;
        });
    }
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statRejected').textContent = rejected;
    document.getElementById('pendingBadge').textContent = pending;
    
    document.querySelectorAll('.stat-num').forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'numberPop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1)';
    });
    
    if (currentTab !== 'slider' && currentTab !== 'marquee') renderShops(currentTab);
});

// ══ SWITCH TAB ══
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const tabEl = document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1));
    if (tabEl) tabEl.classList.add('active');

    document.getElementById('shopSection').style.display = ['pending','approved','rejected'].includes(tab) ? 'block' : 'none';
    document.getElementById('marqueeSection').style.display = tab==='marquee' ? 'block' : 'none';
    document.getElementById('sliderSection').style.display = tab==='slider' ? 'block' : 'none';

    if (tab==='slider') loadSliderAdmin();
    else if (tab==='marquee') loadMarqueeSettings();
    else renderShops(tab);
}

// ══ RENDER SHOPS ══
function renderShops(status) {
    const list = document.getElementById('shopList');
    const filtered = Object.entries(allShops).filter(([,s])=>s.status===status);

    if (!filtered.length) {
        list.innerHTML=`<div class="empty-state">
            <div class="empty-icon">${status==='pending'?'⏳':status==='approved'?'✅':'❌'}</div>
            <div class="empty-title">কোনো দোকান নেই</div>
        </div>`;
        return;
    }

    list.innerHTML = filtered.map(([id,shop],i) => {
        const g = grads[i%grads.length];
        const av = (shop.shopName||'?').charAt(0);
        const statusLabel = shop.status==='pending'?'⏳ পেন্ডিং':shop.status==='approved'?'✅ Approved':'❌ Rejected';

        const actionBtns = status==='pending' ? `
            <button class="ac-btn btn-approve" onclick="updateStatus('${id}','approved')">✅ Approve</button>
            <button class="ac-btn btn-reject"  onclick="updateStatus('${id}','rejected')">❌ Reject</button>
        ` : status==='approved' ? `
            <button class="ac-btn btn-reject" onclick="updateStatus('${id}','rejected')">❌ Reject</button>
            <button class="ac-btn btn-delete" onclick="deleteShop('${id}','${shop.shopName}')">🗑️ Delete</button>
            <button class="ac-btn btn-view"   onclick="window.open('profile.html?id=${id}','_blank')">👁️ দেখুন</button>
        ` : `
            <button class="ac-btn btn-approve" onclick="updateStatus('${id}','approved')">✅ Approve</button>
            <button class="ac-btn btn-delete"  onclick="deleteShop('${id}','${shop.shopName}')">🗑️ Delete</button>
        `;

        return `
        <div class="admin-card">
            <div class="ac-top">
                <div class="ac-avatar" style="background:${g}">${av}</div>
                <div style="flex:1">
                    <div class="ac-name">${shop.shopName||'—'}</div>
                    <div class="ac-info">${shop.ownerName||''}</div>
                </div>
                <div class="status-badge ${shop.status}">${statusLabel}</div>
            </div>
            <div class="ac-row"><span class="ac-row-icon">📍</span><span class="ac-row-val">${shop.area||''}, ${shop.district||''}</span></div>
            <div class="ac-row"><span class="ac-row-icon">📱</span><span class="ac-row-val">${shop.phone||'—'}</span></div>
            <div class="ac-row"><span class="ac-row-icon">✉️</span><span class="ac-row-val">${shop.email||'—'}</span></div>
            ${shop.category?`<div class="ac-row"><span class="ac-row-icon">🗂️</span><span class="ac-row-val">${shop.category}</span></div>`:''}
            <div class="ac-actions">${actionBtns}</div>
        </div>`;
    }).join('');
    
    document.querySelectorAll('.admin-card').forEach((card, idx) => {
        card.style.animation = `tileIn 0.4s ease both ${idx * 0.05}s`;
    });
}

// ══ UPDATE STATUS ══
async function updateStatus(id, status) {
    try {
        await db.ref('shops/'+id).update({status});
        showToast(status==='approved'?'✅ Approved!':'❌ Rejected!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ DELETE SHOP ══
async function deleteShop(id, name) {
    if (!confirm(`"${name}" Delete করবেন?`)) return;
    try {
        await db.ref('shops/'+id).remove();
        showToast('🗑️ Delete হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ MARQUEE FUNCTIONS ══
function loadMarqueeSettings() {
    db.ref('marquee').on('value', snap => {
        if (snap.exists()) {
            const data = snap.val();
            document.getElementById('marqueeTextInput').value = data.text || '';
            document.getElementById('marqueeEnableCheck').checked = data.enabled === true;
            updateMarqueePreview(data.text || '');
        } else {
            document.getElementById('marqueeTextInput').value = '';
            document.getElementById('marqueeEnableCheck').checked = false;
            updateMarqueePreview('');
        }
    });
}

function updateMarqueePreview(text) {
    const previewEl = document.getElementById('marqueePreview');
    if (text && text.trim() !== '') {
        previewEl.innerHTML = `<marquee behavior="scroll" direction="left" scrollamount="4">✨ ${text} ✨</marquee>`;
    } else {
        previewEl.innerHTML = '<span style="opacity:0.6">🔇 চলন্ত লেখা বন্ধ আছে</span>';
    }
}

async function saveMarquee() {
    const text = document.getElementById('marqueeTextInput').value.trim();
    const enabled = document.getElementById('marqueeEnableCheck').checked;
    try {
        await db.ref('marquee').set({ text: text, enabled: enabled });
        updateMarqueePreview(text);
        showToast('💾 চলন্ত লেখার সেটিংস সংরক্ষিত!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ SLIDER ADMIN ══
function loadSliderAdmin() {
    db.ref('slider').on('value', snap => {
        const list = document.getElementById('slideList');
        if (!snap.exists()) {
            list.innerHTML = '<div class="sl-empty">এখনো কোনো Slide নেই। নিচে যোগ করুন।</div>';
            return;
        }
        let html = '';
        snap.forEach(child => {
            const s = child.val();
            const key = child.key;
            html += `
            <div class="sl-item">
                <img src="${s.image}" alt="slide"
                    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div style="display:none;height:130px;background:linear-gradient(135deg,#6c2bd9,#a259f7);align-items:center;justify-content:center;font-size:36px;">🏪</div>
                <div class="sl-item-info">
                    <div class="sl-item-link">🔗 ${s.link||'কোনো লিংক নেই'}</div>
                    <button class="sl-del-btn" onclick="deleteSlide('${key}')">🗑️ Delete</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    });
}

async function addSlide() {
    const img  = document.getElementById('slideImg').value.trim();
    const link = document.getElementById('slideLink').value.trim();
    if (!img) { showToast('⚠️ ছবির URL দিন!'); return; }
    try {
        await db.ref('slider').push({image:img, link:link||''});
        document.getElementById('slideImg').value  = '';
        document.getElementById('slideLink').value = '';
        showToast('✅ Slide যোগ হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

async function deleteSlide(key) {
    if (!confirm('এই Slide Delete করবেন?')) return;
    try {
        await db.ref('slider/'+key).remove();
        showToast('🗑️ Slide Delete হয়েছে!');
    } catch(e) { showToast('⚠️ সমস্যা হয়েছে!'); }
}

// ══ TOAST ══
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3000);
}
</script>
</body>
</html>
