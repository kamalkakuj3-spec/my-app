<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>লগইন - বাংলাদেশ মেলা</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 2rem;
            color: #1a1a1a;
            background: linear-gradient(135deg, #1a1a1a, #555);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .logo p {
            color: #666;
            margin-top: 8px;
        }
        
        .google-btn {
            background: white;
            border: 1px solid #ddd;
            border-radius: 50px;
            padding: 14px 24px;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .google-btn:hover {
            background: #f5f5f5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .google-btn img {
            width: 22px;
            height: 22px;
        }
        
        .loader {
            display: none;
            margin-top: 20px;
            color: #666;
        }
        
        .loader.show {
            display: block;
        }
        
        .error-msg {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 0.85rem;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 0.75rem;
        }
        
        .back-home {
            margin-top: 20px;
        }
        
        .back-home a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .back-home a:hover {
            text-decoration: underline;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fa-spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🇧🇩 বাংলাদেশ মেলা</h1>
            <p>দেশের মেলার ঠিকানা</p>
        </div>
        
        <p style="color: #555; margin-bottom: 10px;">লগইন করে শুরু করুন</p>
        
        <button id="googleLoginBtn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            কন্টিনিউ উইথ গুগল
        </button>
        
        <div id="loader" class="loader">
            <i class="fa-solid fa-spinner fa-spin"></i> লগইন হচ্ছে...
        </div>
        
        <div id="errorMsg" class="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i> লগইন ব্যর্থ হয়েছে। আবার চেষ্টা করুন।
        </div>
        
        <div class="back-home">
            <a href="mela-index.html">← হোমপেজে ফিরে যান</a>
        </div>
        
        <div class="footer">
            <p>বাংলাদেশের সকল মেলার তথ্য পেতে লগইন করুন</p>
        </div>
    </div>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCZ6L7QiarIOIeiK62HEdaSyr84ORVKwl4",
            authDomain: "pikaribazar-e5f17.firebaseapp.com",
            databaseURL: "https://pikaribazar-e5f17-default-rtdb.firebaseio.com",
            projectId: "pikaribazar-e5f17",
            storageBucket: "pikaribazar-e5f17.firebasestorage.app",
            messagingSenderId: "819295862018",
            appId: "1:819295862018:web:c24937bebb24be75cd961b",
            measurementId: "G-PVKZ2KJ7K4"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        // DOM Elements
        const googleBtn = document.getElementById("googleLoginBtn");
        const loader = document.getElementById("loader");
        const errorMsg = document.getElementById("errorMsg");
        
        // চেক করা ইতিমধ্যে লগইন করা আছে কিনা
        auth.onAuthStateChanged((user) => {
            if (user) {
                // ইতিমধ্যে লগইন করা আছে, সরাসরি হোম পেজে যাবে
                console.log("Already logged in:", user.displayName);
                window.location.href = "mela-index.html";
            }
        });
        
        // গুগল লগইন বাটন ক্লিক
        googleBtn.addEventListener("click", async () => {
            googleBtn.disabled = true;
            loader.classList.add("show");
            errorMsg.classList.remove("show");
            
            try {
                const result = await auth.signInWithPopup(provider);
                console.log("Login success:", result.user.displayName);
                // লগইন সফল, হোম পেজে যাবে
                window.location.href = "mela-index.html";
            } catch (error) {
                console.error("Login error:", error);
                googleBtn.disabled = false;
                loader.classList.remove("show");
                errorMsg.classList.add("show");
                
                // পপ-আপ ব্লক হলে মেসেজ দেখানো
                if (error.code === "auth/popup-blocked") {
                    errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> পপ-আপ ব্লক হয়েছে! ব্রাউজার সেটিংস থেকে পপ-আপ অনুমোদন করুন।';
                } else if (error.code === "auth/unauthorized-domain") {
                    errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> এই ডোমেইন অনুমোদিত নয়। Firebase কনসোলে এই ডোমেইন যোগ করুন।';
                } else if (error.code === "auth/network-request-failed") {
                    errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> নেটওয়ার্ক সমস্যা! আপনার ইন্টারনেট সংযোগ চেক করুন।';
                } else {
                    errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> লগইন ব্যর্থ। আবার চেষ্টা করুন।';
                }
            }
        });
    </script>
</body>
</html>
