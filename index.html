<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইউটিউব প্লেয়ার | BizNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #e8e0ff 100%);
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c2bd9;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #6c2bd9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 32px;
            color: #94a3b8;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* YouTube Video Card */
        .video-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px -12px rgba(108, 43, 217, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 45px -12px rgba(108, 43, 217, 0.35);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* YouTube Player Container */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .no-video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, #1a0a3e, #6c2bd9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            flex-direction: column;
            gap: 8px;
        }
        .no-video i {
            font-size: 48px;
            opacity: 0.6;
        }

        /* Shop Info */
        .shop-info {
            padding: 20px;
            text-align: center;
        }
        .shop-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
            cursor: pointer;
            transition: color 0.2s;
            display: inline-block;
        }
        .shop-name:hover {
            color: #6c2bd9;
            text-decoration: underline;
        }
        .shop-address {
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .shop-address i {
            color: #6c2bd9;
            font-size: 12px;
        }

        /* View Profile Button */
        .view-profile-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #6c2bd9, #a259f7);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .view-profile-btn:hover {
            transform: scale(0.96);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding: 16px;
            color: #94a3b8;
            font-size: 0.7rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .shop-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-play-circle"></i> BizNest প্লেয়ার</h1>
        <p>দোকানের প্রোমোশনাল ভিডিও দেখুন</p>
    </div>

    <div id="content">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <div>ভিডিও লোড হচ্ছে...</div>
        </div>
    </div>

    <div class="footer">
        <i class="fas fa-store"></i> BizNest | পাইকারি বাজার
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
    // Firebase Configuration (আপনার বিদ্যমান কনফিগ)
    const firebaseConfig = {
        apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
        authDomain: "agls-5bd4c.firebaseapp.com",
        databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
        projectId: "agls-5bd4c",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ইউটিউব লিংক থেকে ভিডিও আইডি বের করার ফাংশন
    function getYouTubeVideoId(url) {
        if (!url) return null;
        
        // প্যাটার্ন: youtube.com/watch?v=... বা youtu.be/... বা youtube.com/embed/...
        const patterns = [
            /(?:youtube\.com\/watch\?v=)([^&]+)/,
            /(?:youtu\.be\/)([^?]+)/,
            /(?:youtube\.com\/embed\/)([^?]+)/
        ];
        
        for (let pattern of patterns) {
            const match = url.match(pattern);
            if (match) return match[1];
        }
        
        return null;
    }

    // Escape HTML ফাংশন
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // শুধুমাত্র সেই দোকানগুলোর ভিডিও দেখাবে যাদের status approved এবং youtube ভিডিও আছে
    async function loadVideoShops() {
        const contentDiv = document.getElementById('content');
        
        try {
            const snapshot = await db.ref('shops').once('value');
            
            if (!snapshot.exists()) {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏪</div>
                        <div>কোনো দোকান নেই</div>
                    </div>
                `;
                return;
            }
            
            // শুধুমাত্র approved দোকান এবং যাদের ইউটিউব ভিডিও আছে তাদের নেওয়া হবে
            const shopsWithVideo = [];
            
            snapshot.forEach(child => {
                const shop = child.val();
                // চেক করবো: status approved, এবং youtube বা youtubeVideoId আছে
                if (shop.status === 'approved') {
                    let videoId = null;
                    
                    // প্রথমে youtubeVideoId চেক করি
                    if (shop.youtubeVideoId) {
                        videoId = shop.youtubeVideoId;
                    } 
                    // না থাকলে youtube লিংক থেকে বের করি
                    else if (shop.youtube) {
                        videoId = getYouTubeVideoId(shop.youtube);
                    }
                    // youtubeLink থেকেও চেক করা যেতে পারে
                    else if (shop.youtubeLink) {
                        videoId = getYouTubeVideoId(shop.youtubeLink);
                    }
                    
                    if (videoId) {
                        shopsWithVideo.push({
                            id: child.key,
                            shopName: shop.shopName || 'দোকানের নাম',
                            ownerName: shop.ownerName || '',
                            division: shop.division || '',
                            district: shop.district || '',
                            thana: shop.thana || '',
                            area: shop.area || '',
                            videoId: videoId
                        });
                    }
                }
            });
            
            if (shopsWithVideo.length === 0) {
                contentDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fab fa-youtube"></i></div>
                        <div>কোনো ভিডিও পাওয়া যায়নি</div>
                        <div style="font-size: 12px; margin-top: 8px;">এখনো কোনো দোকান ইউটিউব ভিডিও যোগ করেনি</div>
                    </div>
                `;
                return;
            }
            
            // সব ভিডিও কার্ড তৈরি করা (একসাথে সব দেখাবে)
            let allCardsHtml = '';
            
            shopsWithVideo.forEach(shop => {
                // ঠিকানা তৈরী করা
                let addressParts = [];
                if (shop.thana) addressParts.push(shop.thana);
                if (shop.district) addressParts.push(shop.district);
                if (shop.division) addressParts.push(shop.division);
                if (shop.area && !shop.thana) addressParts.unshift(shop.area);
                
                const addressText = addressParts.join(', ') || 'ঠিকানা নেই';
                
                allCardsHtml += `
                    <div class="video-card" data-shop-id="${shop.id}">
                        <div class="video-container">
                            <iframe class="video-iframe" 
                                    src="https://www.youtube.com/embed/${shop.videoId}?enablejsapi=1&rel=0&modestbranding=1"
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                        </div>
                        <div class="shop-info">
                            <div class="shop-name" onclick="viewShopProfile('${shop.id}')">
                                ${escapeHtml(shop.shopName)}
                            </div>
                            <div class="shop-address">
                                <i class="fas fa-map-marker-alt"></i>
                                ${escapeHtml(addressText)}
                            </div>
                            <button class="view-profile-btn" onclick="viewShopProfile('${shop.id}')">
                                <i class="fas fa-store"></i> প্রোফাইল দেখুন
                            </button>
                        </div>
                    </div>
                `;
            });
            
            contentDiv.innerHTML = allCardsHtml;
            
        } catch (error) {
            console.error('Error loading videos:', error);
            contentDiv.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div>ডাটা লোড করতে সমস্যা হয়েছে</div>
                    <div style="font-size: 12px; margin-top: 8px;">${error.message}</div>
                </div>
            `;
        }
    }

    // প্রোফাইল পেজে যাওয়ার ফাংশন
    window.viewShopProfile = function(shopId) {
        if (shopId) {
            window.location.href = `profile.html?id=${shopId}`;
        }
    };

    // ভিডিও লোড করা শুরু করুন
    loadVideoShops();
</script>
</body>
</html>
