<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>পাইকারি বাজার | পাইকারি দোকানের সেরা ঠিকানা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* আপনার বিদ্যমান সব CSS একই থাকবে (স্থান বাঁচাতে এখনে দিচ্ছি না, কিন্তু আপনার মূল ফাইল থেকে কপি করে নিন) */
:root {
    --primary: #6c2bd9;
    --primary-dark: #4a1a9e;
    --primary-light: #a259f7;
    --accent: #f0c040;
    --bg: #f5f3ff;
    --text: #1a1a2e;
    --text-light: #666;
    --shadow: 0 4px 20px rgba(108,43,217,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    font-family:'Hind Siliguri',sans-serif; 
    background:var(--bg); 
    min-height:100vh; 
    overflow-x:hidden;
    padding-bottom: 80px;
}
/* আপনার সব CSS এখানে থাকবে... (স্থান বাঁচাতে বাদ দিলাম, আসল ফাইল থেকে কপি করুন) */
/* নিচে শুধু অতিরিক্ত স্টাইল যোগ করা হলো */
.filter-wrap { padding:0 16px; margin-bottom:6px; }
.filter-step { background:white; border-radius:14px; padding:12px 14px; box-shadow:var(--shadow); margin-bottom:8px; border:1.5px solid rgba(108,43,217,0.06); }
.fs-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.fs-num { width:24px; height:24px; border-radius:50%; background:var(--primary); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.fs-num.done { background:#2ecc71; }
.fs-title { font-size:13px; font-weight:700; color:var(--text); }
.fs-sel   { font-size:11px; color:var(--primary); font-weight:600; margin-left:auto; }
.chip-scroll { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.chip-scroll::-webkit-scrollbar { display:none; }
.f-chip { padding:6px 14px; border-radius:99px; font-size:12px; font-family:'Hind Siliguri',sans-serif; font-weight:500; white-space:nowrap; cursor:pointer; border:2px solid #e0d9f7; background:white; color:var(--text); transition:all 0.2s; flex-shrink:0; }
.f-chip.active { background:var(--primary); color:white; border-color:var(--primary); box-shadow:0 4px 12px rgba(108,43,217,0.3); }
.hidden { display:none; }
.reset-btn { width:100%; padding:8px; background:#f0ebff; color:var(--primary); border:none; border-radius:12px; font-size:13px; font-weight:600; font-family:'Hind Siliguri',sans-serif; cursor:pointer; margin-bottom:8px; display:none; }
</style>
</head>
<body>

<!-- আপনার বিদ্যমান HTML স্ট্রাকচার একই থাকবে (splash, noInternet, search, slider, add-banner, filter-wrap, shopList, bottom-nav) -->
<!-- এখানে শুধু filter-wrap অংশটুকু আগের মতোই আছে, স্ক্রিপ্ট পরিবর্তন হবে -->

<div id="app">
    <!-- search-section, slider-section, marqueeSection, add-banner সব আগের মতো -->
    
    <div class="filter-wrap">
        <button class="reset-btn" id="resetBtn" onclick="window.resetFilters()">🔄 ফিল্টার রিসেট করুন</button>

        <div class="filter-step" id="step1">
            <div class="fs-header">
                <div class="fs-num" id="num1">১</div>
                <div class="fs-title">বিভাগ বাছাই করুন</div>
                <div class="fs-sel" id="sel1"></div>
            </div>
            <div class="chip-scroll" id="divisionChips">
                <!-- বিভাগের চিপ JS দিয়ে লোড হবে -->
            </div>
        </div>

        <div class="filter-step hidden" id="step2">
            <div class="fs-header">
                <div class="fs-num" id="num2">২</div>
                <div class="fs-title">জেলা বাছাই করুন</div>
                <div class="fs-sel" id="sel2"></div>
            </div>
            <div class="chip-scroll" id="districtChips"></div>
        </div>

        <div class="filter-step hidden" id="step3">
            <div class="fs-header">
                <div class="fs-num" id="num3">৩</div>
                <div class="fs-title">থানা/উপজেলা বাছাই করুন</div>
                <div class="fs-sel" id="sel3"></div>
            </div>
            <div class="chip-scroll" id="thanaChips"></div>
        </div>

        <div class="filter-step hidden" id="step4">
            <!-- ক্যাটাগরি অংশ আগের মতো থাকবে -->
            <div class="fs-header">
                <div class="fs-num" id="num4">৪</div>
                <div class="fs-title">ক্যাটাগরি বাছাই করুন</div>
                <div class="fs-sel" id="sel4"></div>
            </div>
            <div class="chip-scroll" id="categoryChips"></div>
        </div>
    </div>

    <div id="shopList"></div>
</div>

<!-- bottom-nav আগের মতো -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// Firebase configuration (আগের মতো)
firebase.initializeApp({
    apiKey: "AIzaSyA1CzQX9tgbLd46QfvCK6Rwqa0z9CRWoMs",
    authDomain: "agls-5bd4c.firebaseapp.com",
    databaseURL: "https://agls-5bd4c-default-rtdb.firebaseio.com/",
    projectId: "agls-5bd4c",
});
const auth = firebase.auth();
const db = firebase.database();

// ========== JSON ডাটা লোড ==========
const JSON_URL = 'https://raw.githubusercontent.com/kamalkakuj3-spec/my-app/main/divisions.json';

let geoData = []; // বিভাগের ডাটা
let selectedDivision = '';
let selectedDistrict = '';
let selectedThana = '';
let selectedCategories = [];

let allShops = [];
let videoObservers = [];
let curSlide = 0, slTimer = null, slData = [];

// ========== JSON লোড ফাংশন ==========
async function loadGeoData() {
    try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        geoData = data.divisions;
        
        // বিভাগের চিপ তৈরি করুন
        const divisionContainer = document.getElementById('divisionChips');
        divisionContainer.innerHTML = '<div class="f-chip active" onclick="window.selectDivision(\'\')">সব বিভাগ</div>';
        
        geoData.forEach(div => {
            const chip = document.createElement('div');
            chip.className = 'f-chip';
            chip.textContent = div.name;
            chip.onclick = () => window.selectDivision(div.name);
            divisionContainer.appendChild(chip);
        });
        
        console.log('JSON লোড সফল!', geoData.length, 'টি বিভাগ');
    } catch (error) {
        console.error('JSON লোড ব্যর্থ:', error);
        alert('divisions.json লোড করতে ব্যর্থ! নেটওয়ার্ক চেক করুন।');
    }
}

// ========== ফিল্টার ফাংশন (JSON ভিত্তিক) ==========
window.selectDivision = function(div) {
    selectedDivision = div;
    selectedDistrict = '';
    selectedThana = '';
    
    // UI আপডেট
    document.querySelectorAll('#divisionChips .f-chip').forEach(c => {
        const isActive = c.textContent === (div || 'সব বিভাগ');
        if (isActive) c.classList.add('active');
        else c.classList.remove('active');
    });
    
    const sel1Span = document.getElementById('sel1');
    if (sel1Span) sel1Span.textContent = div ? `✅ ${div}` : '';
    
    const num1Div = document.getElementById('num1');
    if (num1Div) num1Div.className = div ? 'fs-num done' : 'fs-num';
    
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.style.display = div ? 'block' : 'none';
    
    if (div) {
        // জেলা লোড করুন
        const division = geoData.find(d => d.name === div);
        const districts = division ? division.districts : [];
        const districtContainer = document.getElementById('districtChips');
        districtContainer.innerHTML = `<div class="f-chip active" onclick="window.selectDistrict('')">সব জেলা</div>`;
        
        districts.forEach(d => {
            const chip = document.createElement('div');
            chip.className = 'f-chip';
            chip.textContent = d.name;
            chip.onclick = () => window.selectDistrict(d.name);
            districtContainer.appendChild(chip);
        });
        
        document.getElementById('step2')?.classList.remove('hidden');
        document.getElementById('step3')?.classList.add('hidden');
        document.getElementById('step4')?.classList.add('hidden');
        
        if (document.getElementById('sel2')) document.getElementById('sel2').textContent = '';
        if (document.getElementById('sel3')) document.getElementById('sel3').textContent = '';
        if (document.getElementById('num2')) document.getElementById('num2').className = 'fs-num';
        if (document.getElementById('num3')) document.getElementById('num3').className = 'fs-num';
    } else {
        document.getElementById('step2')?.classList.add('hidden');
        document.getElementById('step3')?.classList.add('hidden');
        document.getElementById('step4')?.classList.add('hidden');
    }
    window.applyFilters();
};

window.selectDistrict = function(dist) {
    selectedDistrict = dist;
    selectedThana = '';
    
    document.querySelectorAll('#districtChips .f-chip').forEach(c => {
        const isActive = c.textContent === (dist || 'সব জেলা');
        if (isActive) c.classList.add('active');
        else c.classList.remove('active');
    });
    
    const sel2Span = document.getElementById('sel2');
    if (sel2Span) sel2Span.textContent = dist ? `✅ ${dist}` : '';
    
    const num2Div = document.getElementById('num2');
    if (num2Div) num2Div.className = dist ? 'fs-num done' : 'fs-num';
    
    if (dist) {
        // উপজেলা লোড করুন
        const division = geoData.find(d => d.name === selectedDivision);
        const district = division?.districts.find(d => d.name === dist);
        const upazilas = district ? district.upazilas : [];
        const thanaContainer = document.getElementById('thanaChips');
        thanaContainer.innerHTML = `<div class="f-chip active" onclick="window.selectThana('')">সব উপজেলা</div>`;
        
        upazilas.forEach(u => {
            const chip = document.createElement('div');
            chip.className = 'f-chip';
            chip.textContent = u;
            chip.onclick = () => window.selectThana(u);
            thanaContainer.appendChild(chip);
        });
        
        document.getElementById('step3')?.classList.remove('hidden');
        document.getElementById('step4')?.classList.add('hidden');
        if (document.getElementById('sel3')) document.getElementById('sel3').textContent = '';
        if (document.getElementById('num3')) document.getElementById('num3').className = 'fs-num';
    } else {
        document.getElementById('step3')?.classList.add('hidden');
        document.getElementById('step4')?.classList.add('hidden');
    }
    window.applyFilters();
};

window.selectThana = function(thana) {
    selectedThana = thana;
    
    document.querySelectorAll('#thanaChips .f-chip').forEach(c => {
        const isActive = c.textContent === (thana || 'সব উপজেলা');
        if (isActive) c.classList.add('active');
        else c.classList.remove('active');
    });
    
    const sel3Span = document.getElementById('sel3');
    if (sel3Span) sel3Span.textContent = thana ? `✅ ${thana}` : '';
    
    const num3Div = document.getElementById('num3');
    if (num3Div) num3Div.className = thana ? 'fs-num done' : 'fs-num';
    
    if (thana) {
        document.getElementById('step4')?.classList.remove('hidden');
    } else {
        document.getElementById('step4')?.classList.add('hidden');
    }
    window.applyFilters();
};

// ক্যাটাগরি ফাংশন (আগের মতোই থাকবে)
const allCategories = ['পোশাক ও বস্ত্র', 'খাদ্যপণ্য ও মসলা', 'ইলেকট্রনিক্স', 'গৃহস্থালি পণ্য', 'হার্ডওয়্যার ও নির্মাণ', 'ওষুধ ও স্বাস্থ্য', 'সৌন্দর্য ও কসমেটিক্স', 'ব্যাগ ও জুতা', 'কৃষি ও সার', 'স্টেশনারি ও অফিস', 'অটোমোবাইল', 'খেলনা ও শিশু পণ্য', 'উপহার ও সাজসজ্জা', 'প্যাকেজিং সামগ্রী', 'শিল্প ও কারখানা', 'মাছ ও মাংস', 'নার্সারি ও বাগান', 'খেলাধুলা সামগ্রী', 'বই ও শিক্ষা সামগ্রী', 'সোলার ও বিদ্যুৎ', 'সেলাই ও কারুকাজ', 'যানবাহন যন্ত্রাংশ', 'অন্যান্য'];

function loadCategoryChips() {
    const container = document.getElementById('categoryChips');
    container.innerHTML = '<div class="f-chip active" onclick="window.selectCategory(\'\')">সব</div>';
    allCategories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'f-chip';
        chip.innerHTML = cat;
        chip.onclick = () => window.selectCategory(cat);
        container.appendChild(chip);
    });
}

window.selectCategory = function(cat) {
    if (cat === '') selectedCategories = [];
    else selectedCategories = [cat];
    updateCategoryUI();
    window.applyFilters();
};

function updateCategoryUI() {
    const sel4Span = document.getElementById('sel4');
    if (sel4Span) sel4Span.textContent = selectedCategories.length ? `✅ ${selectedCategories.length}টি` : '';
    const num4Div = document.getElementById('num4');
    if (num4Div) num4Div.className = selectedCategories.length ? 'fs-num done' : 'fs-num';
    
    document.querySelectorAll('#categoryChips .f-chip').forEach(c => {
        const isActive = selectedCategories.includes(c.textContent);
        if (isActive) c.classList.add('active');
        else c.classList.remove('active');
    });
}

window.resetFilters = function() {
    selectedDivision = '';
    selectedDistrict = '';
    selectedThana = '';
    selectedCategories = [];
    
    document.getElementById('step2')?.classList.add('hidden');
    document.getElementById('step3')?.classList.add('hidden');
    document.getElementById('step4')?.classList.add('hidden');
    if (document.getElementById('resetBtn')) document.getElementById('resetBtn').style.display = 'none';
    
    if (document.getElementById('sel1')) document.getElementById('sel1').textContent = '';
    if (document.getElementById('sel2')) document.getElementById('sel2').textContent = '';
    if (document.getElementById('sel3')) document.getElementById('sel3').textContent = '';
    if (document.getElementById('sel4')) document.getElementById('sel4').textContent = '';
    if (document.getElementById('num1')) document.getElementById('num1').className = 'fs-num';
    if (document.getElementById('num4')) document.getElementById('num4').className = 'fs-num';
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.value = '';
    
    document.querySelectorAll('#divisionChips .f-chip').forEach(c => {
        if (c.textContent === 'সব বিভাগ') c.classList.add('active');
        else c.classList.remove('active');
    });
    
    updateCategoryUI();
    window.applyFilters();
};

window.applyFilters = function() {
    let filtered = [...allShops];
    
    if (selectedDivision) {
        const division = geoData.find(d => d.name === selectedDivision);
        const districtNames = division ? division.districts.map(d => d.name) : [];
        filtered = filtered.filter(shop => districtNames.includes(shop.district));
    }
    if (selectedDistrict) {
        filtered = filtered.filter(shop => shop.district === selectedDistrict);
    }
    if (selectedThana) {
        filtered = filtered.filter(shop => shop.thana === selectedThana);
    }
    if (selectedCategories.length > 0) {
        filtered = filtered.filter(shop => selectedCategories.includes(shop.category));
    }
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput && searchInput.value.trim()) {
        const q = searchInput.value.trim().toLowerCase();
        filtered = filtered.filter(shop => 
            (shop.shopName || '').toLowerCase().includes(q) ||
            (shop.area || '').toLowerCase().includes(q) ||
            (shop.district || '').toLowerCase().includes(q) ||
            (shop.thana || '').toLowerCase().includes(q)
        );
    }
    
    window.renderShops(filtered);
};

// রেন্ডার ফাংশন (আগের মতো)
window.renderShops = function(shops) {
    const container = document.getElementById('shopList');
    if (!container) return;
    if (shops.length === 0) {
        container.innerHTML = `<div class="empty"><div class="empty-icon">🏪</div><div class="empty-title">কোনো দোকান নেই</div><div class="empty-sub">অন্য ফিল্টার চেষ্টা করুন</div></div>`;
        return;
    }
    container.innerHTML = shops.map(shop => {
        let videoId = null;
        if (shop.youtubeVideoId) videoId = shop.youtubeVideoId;
        else if (shop.youtube) {
            const match = shop.youtube.match(/(?:youtube\.com\/watch\?v=)([^&]+)/);
            if (match) videoId = match[1];
        }
        const videoEmbed = videoId ? `<iframe class="shop-video" src="https://www.youtube.com/embed/${videoId}?enablejsapi=1" frameborder="0" allowfullscreen></iframe>` : `<div class="no-video">🎬 কোন ভিডিও নেই</div>`;
        return `<div class="shop-video-card"><div class="video-player-card">${videoEmbed}</div><div class="shop-video-info"><h3 class="shop-video-name" onclick="window.viewShop('${shop.id}')">${shop.shopName || 'নাম নেই'}</h3><p class="shop-video-desc">${shop.description || shop.category || 'পাইকারি দোকান'}</p><p class="shop-video-address">${shop.thana ? `${shop.thana}, ${shop.district}` : `${shop.area || ''}, ${shop.district || ''}`}</p></div></div>`;
    }).join('');
};

window.viewShop = (id) => { if(id) window.location.href = `profile.html?id=${id}`; };

// Firebase ডাটা লোড
window.loadShops = function() {
    db.ref('shops').on('value', snap => {
        allShops = [];
        if (snap.exists()) {
            snap.forEach(c => {
                const shop = c.val();
                if (shop.status === 'approved') allShops.push({ id: c.key, ...shop });
            });
        }
        window.applyFilters();
    });
};

window.loadMarquee = function() {
    db.ref('marquee').on('value', snap => {
        const container = document.getElementById('marqueeSection');
        if (!container) return;
        if (snap.exists() && snap.val().enabled && snap.val().text) {
            container.innerHTML = `<div class="marquee-container"><marquee>✨ ${snap.val().text} ✨</marquee></div>`;
        } else {
            container.innerHTML = `<div class="marquee-disabled">🔇 কোনো ঘোষণা নেই</div>`;
        }
    });
};

window.loadSlider = function() {
    db.ref('slider').on('value', snap => {
        slData = [];
        if (snap.exists()) snap.forEach(c => { if (c.val().image) slData.push(c.val()); });
        const sec = document.getElementById('sliderSection');
        if (!sec) return;
        if (!slData.length) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';
        const track = document.getElementById('sliderTrack');
        const dots = document.getElementById('sliderDots');
        track.innerHTML = slData.map(s => `<div class="slide-item"><img src="${s.image}"></div>`).join('');
        dots.innerHTML = slData.map((_, i) => `<div class="sl-dot" onclick="goSlide(${i})"></div>`).join('');
        goSlide(0);
        if (slTimer) clearInterval(slTimer);
        if (slData.length > 1) slTimer = setInterval(() => goSlide((curSlide+1)%slData.length), 3500);
    });
};

function goSlide(n) { if(!slData.length) return; curSlide = (n+slData.length)%slData.length; document.getElementById('sliderTrack').style.transform = `translateX(-${curSlide*100}%)`; document.querySelectorAll('.sl-dot').forEach((d,i)=>{ d.className = 'sl-dot'+(i===curSlide?' active':'') }); }
window.prevSlide = () => { if(slTimer) clearInterval(slTimer); goSlide(curSlide-1); if(slData.length>1) slTimer = setInterval(()=>goSlide((curSlide+1)%slData.length),3500); };
window.nextSlide = () => { if(slTimer) clearInterval(slTimer); goSlide(curSlide+1); if(slData.length>1) slTimer = setInterval(()=>goSlide((curSlide+1)%slData.length),3500); };

window.checkNet = () => {
    if (navigator.onLine) {
        document.getElementById('noInternet').style.display = 'none';
        loadGeoData();
        loadMarquee();
        loadSlider();
        loadShops();
    } else {
        document.getElementById('noInternet').style.display = 'flex';
    }
};

// নেভিগেশন
window.navigateTo = (page, e) => {
    if (e && e.currentTarget) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }
    if (page === 'category') window.openCategoryPopup();
    else if (page === 'searchFocus') document.getElementById('searchInput')?.focus();
    else if (page === 'profile') window.location.href = 'login.html';
    else if (page === 'help') window.location.href = 'help.html';
};

document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', (e) => {
        window.navigateTo(btn.getAttribute('data-page'), e);
    });
});

// ক্যাটাগরি পপআপ (আগের মতো)
window.openCategoryPopup = function() {
    const existing = document.querySelector('.category-popup-overlay');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.className = 'category-popup-overlay';
    overlay.innerHTML = `<div class="category-popup"><div class="popup-header"><h3>📂 ক্যাটাগরি নির্বাচন করুন</h3><button class="popup-close" onclick="this.closest('.category-popup-overlay').remove()">✕</button></div><div class="popup-body"><div class="category-grid">${allCategories.map(cat => `<div class="cat-check" onclick="toggleCategoryPopup('${cat}', this)"><input type="checkbox"> <label>${cat}</label></div>`).join('')}</div></div><div class="popup-footer"><button class="btn-clear" onclick="clearAllCategoriesPopup()">সব বাদ দিন</button><button class="btn-apply" onclick="applyCategoryPopup()">প্রয়োগ করুন</button></div></div>`;
    document.body.appendChild(overlay);
    selectedCategories.forEach(cat => {
        const div = Array.from(document.querySelectorAll('.cat-check')).find(d => d.querySelector('label')?.textContent === cat);
        if (div) { div.classList.add('selected'); div.querySelector('input').checked = true; }
    });
};
window.toggleCategoryPopup = (cat, el) => {
    const idx = selectedCategories.indexOf(cat);
    if (idx === -1) { selectedCategories.push(cat); el.classList.add('selected'); el.querySelector('input').checked = true; }
    else { selectedCategories.splice(idx,1); el.classList.remove('selected'); el.querySelector('input').checked = false; }
};
window.clearAllCategoriesPopup = () => { selectedCategories = []; document.querySelectorAll('.cat-check').forEach(c => { c.classList.remove('selected'); c.querySelector('input').checked = false; }); };
window.applyCategoryPopup = () => { document.querySelector('.category-popup-overlay')?.remove(); updateCategoryUI(); window.applyFilters(); };

auth.onAuthStateChanged((user) => {
    const profileBtn = document.querySelector('.nav-item[data-page="profile"]');
    if (profileBtn) {
        if (user) { profileBtn.innerHTML = '<span class="icon">👤</span>ড্যাশবোর্ড'; profileBtn.setAttribute('data-page','dashboard'); profileBtn.onclick = () => window.location.href='dashboard.html'; }
        else { profileBtn.innerHTML = '<span class="icon">👤</span>প্রোফাইল'; profileBtn.setAttribute('data-page','profile'); profileBtn.onclick = () => window.location.href='login.html'; }
    }
});

window.addEventListener('load', () => {
    loadCategoryChips();
    window.checkNet();
});
window.addEventListener('offline', () => document.getElementById('noInternet').style.display = 'flex');
window.addEventListener('online', () => { document.getElementById('noInternet').style.display = 'none'; window.checkNet(); });
</script>
